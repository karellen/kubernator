apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: widgets.kubernator.example.com
spec:
  group: kubernator.example.com
  names:
    kind: Widget
    plural: widgets
    singular: widget
    shortNames:
      - wg
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              # Non-transition rule: replicas must be <= maxReplicas.
              x-kubernetes-validations:
                - rule: "self.replicas <= self.maxReplicas"
                  message: "replicas must not exceed maxReplicas"
                - rule: "self.name == oldSelf.name"
                  message: "name is immutable"
              required: ["replicas", "maxReplicas", "name"]
              properties:
                name:
                  type: string
                replicas:
                  type: integer
                  minimum: 0
                maxReplicas:
                  type: integer
                  minimum: 0
                ports:
                  # list-type: map with composite key (protocol, port) —
                  # v3 enforces uniqueness of the composite key.
                  type: array
                  x-kubernetes-list-type: map
                  x-kubernetes-list-map-keys:
                    - protocol
                    - port
                  items:
                    type: object
                    required: ["protocol", "port"]
                    properties:
                      protocol:
                        type: string
                      port:
                        type: integer
